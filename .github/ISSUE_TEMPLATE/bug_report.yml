name: Bug Report
description: Report a bug in pr-to-prompt
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please fill out the sections below."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: How can we reproduce this?
      placeholder: |
        1. Run `pr-to-prompt --repo owner/repo --pr 42`
        2. See error...

  - type: input
    id: version
    attributes:
      label: Version
      description: "pr-to-prompt version (run `pr-to-prompt --version`)"

  - type: dropdown
    id: usage
    attributes:
      label: Usage context
      options:
        - CLI
        - GitHub Action
        - Library
