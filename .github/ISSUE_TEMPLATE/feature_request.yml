name: Feature Request
description: Suggest a new feature for pr-to-spec
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CLI
        - GitHub Action
        - Schema
        - Rendering
        - Risk detection
        - Other
